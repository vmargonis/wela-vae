train:
  epochs: 50
  batch_size: 16
  optimizer:
    learning_rate: 0.0001
    type: Adam  # Adagrad, RMSprop, SGD

vae:
  initial_dim: 4096  # this is fixed for the blob dataset
  label_dim: null  # for WeLa variants, choose from 2, 3, 4, ..., 10
  latent_dim: 10  # number of latent dimensions

  weight_seed: 40  # weight initialization random seed
  is_binary_input: false  # change to true only if input is valued in binary
  output_dist: bernoulli  # another choice is gaussian

  encoder:
    activation:
    - relu
    - relu
    units:
    - 512
    - 64
    output_activation: linear

  decoder:
    activation:
    - relu
    - relu
    units:
    - 512
    - 64
    output_activation: sigmoid

  beta: 5  # will be used in betavae and tcvae, and their WeLa variants
  gamma: 1000  # will be used by WeLa variants - label reconstruction loss penalty

  # dip-vae parameters
  dip_vae_type: i  # choose between i and ii
  lambda_off_diag: 200
  lambda_diad: 1000
